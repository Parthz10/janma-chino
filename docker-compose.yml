services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    depends_on:
      - postgres
      - redis
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.celery_app worker --loglevel=INFO
    env_file:
      - backend/.env
    depends_on:
      - redis
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=janma_chino
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"

