services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/janma_chino
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.celery_app worker --loglevel=INFO
    depends_on:
      - redis
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=janma_chino
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"

